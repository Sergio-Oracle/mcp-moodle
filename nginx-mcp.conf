# Nginx reverse proxy pour le serveur MCP Moodle
# Remplacer "mcp.votre-domaine.com" par votre vrai domaine
# et adapter le certificat SSL Let's Encrypt en conséquence

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name mcp.votre-domaine.com;

    # Validation Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirection HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mcp.votre-domaine.com;

    # Certificat SSL Let's Encrypt (généré par certbot)
    ssl_certificate     /etc/letsencrypt/live/mcp.votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.votre-domaine.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/mcp-access.log;
    error_log  /var/log/nginx/mcp-error.log;

    # Timeouts pour les streams SSE longs
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;

    # Endpoint MCP principal
    location /mcp {
        proxy_pass         http://127.0.0.1:8090/mcp;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;

        # CORS pour Claude Desktop et clients MCP
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Accept, Mcp-Session-Id' always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Page d'accueil simple
    location / {
        return 200 'MCP Moodle Server OK — endpoint: https://mcp.votre-domaine.com/mcp';
        add_header Content-Type text/plain;
    }
}
